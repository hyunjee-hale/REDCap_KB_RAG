<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REDCap KB Article Dependency Graph</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1117; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; height: 100vh; overflow: hidden; }

  #app { display: flex; height: 100vh; }

  /* Sidebar */
  #sidebar {
    width: 300px; min-width: 300px; background: #1a1d2e; border-right: 1px solid #2d3154;
    display: flex; flex-direction: column; z-index: 10; overflow: hidden;
  }
  #sidebar-header { padding: 16px; border-bottom: 1px solid #2d3154; }
  #sidebar-header h1 { font-size: 14px; font-weight: 700; color: #a78bfa; letter-spacing: 0.05em; text-transform: uppercase; }
  #sidebar-header p { font-size: 11px; color: #6b7280; margin-top: 4px; }

  #controls { padding: 12px; border-bottom: 1px solid #2d3154; }
  .control-row { margin-bottom: 10px; }
  .control-row label { font-size: 11px; color: #9ca3af; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  input[type="text"] {
    width: 100%; background: #0f1117; border: 1px solid #2d3154; color: #e0e0e0;
    padding: 6px 10px; border-radius: 6px; font-size: 12px; outline: none;
  }
  input[type="text"]:focus { border-color: #7c3aed; }
  select {
    width: 100%; background: #0f1117; border: 1px solid #2d3154; color: #e0e0e0;
    padding: 6px 10px; border-radius: 6px; font-size: 12px; outline: none;
  }

  .space-slider-wrap { display: flex; align-items: center; gap: 8px; }
  .space-slider-wrap span { font-size: 10px; color: #6b7280; white-space: nowrap; }
  input[type="range"] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; background: #2d3154; border-radius: 2px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    background: #7c3aed; border-radius: 50%; cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px; background: #7c3aed;
    border-radius: 50%; cursor: pointer; border: none;
  }
  .btn-group { display: flex; gap: 6px; }
  button {
    flex: 1; padding: 6px 8px; background: #2d3154; border: 1px solid #3d4468;
    color: #c0c4d6; border-radius: 6px; cursor: pointer; font-size: 11px; transition: all 0.15s;
  }
  button:hover { background: #3d4468; color: #e0e0e0; }
  button.active { background: #7c3aed; border-color: #7c3aed; color: white; }

  /* Legend */
  #legend { padding: 12px; border-bottom: 1px solid #2d3154; overflow-y: auto; flex: 1; }
  #legend h3 { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .legend-item {
    display: flex; align-items: center; gap: 8px; padding: 3px 4px; border-radius: 4px;
    cursor: pointer; transition: background 0.1s; font-size: 12px;
  }
  .legend-item:hover { background: #2d3154; }
  .legend-item.dimmed { opacity: 0.35; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-count { margin-left: auto; font-size: 10px; color: #6b7280; }

  /* Info panel */
  #info-panel {
    padding: 12px; background: #1a1d2e; border-top: 1px solid #2d3154;
    min-height: 120px; font-size: 12px;
  }
  #info-panel h3 { font-size: 13px; font-weight: 600; color: #a78bfa; margin-bottom: 6px; }
  #info-panel .info-id { font-size: 10px; color: #6b7280; margin-bottom: 8px; }
  #info-panel .info-stat { color: #9ca3af; margin-bottom: 2px; }
  #info-panel .info-stat span { color: #e0e0e0; font-weight: 500; }
  #info-placeholder { color: #4b5563; font-size: 12px; text-align: center; padding-top: 20px; }

  /* Graph area */
  #graph-container { flex: 1; position: relative; overflow: hidden; }
  svg { width: 100%; height: 100%; }

  /* Nodes */
  .node circle { cursor: pointer; transition: r 0.2s; }
  .node text {
    font-size: 9px; fill: #9ca3af; pointer-events: none;
    text-shadow: 0 0 3px #0f1117, 0 0 3px #0f1117;
  }
  .node.highlighted circle { stroke: #fff; stroke-width: 2px; }
  .node.dimmed circle { opacity: 0.12; }
  .node.dimmed text { opacity: 0; }

  /* Edges */
  .link { stroke: #2d3154; stroke-opacity: 0.4; fill: none; }
  .link.highlighted { stroke: #a78bfa; stroke-opacity: 0.9; }
  .link.dimmed { stroke-opacity: 0.04; }

  /* Tooltip */
  #tooltip {
    position: absolute; background: #1a1d2e; border: 1px solid #3d4468;
    border-radius: 8px; padding: 10px 14px; font-size: 12px; pointer-events: none;
    max-width: 260px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 100;
    display: none;
  }
  #tooltip .t-id { font-size: 10px; color: #7c3aed; font-weight: 600; margin-bottom: 3px; }
  #tooltip .t-title { color: #e0e0e0; font-weight: 500; line-height: 1.3; margin-bottom: 6px; }
  #tooltip .t-cat { font-size: 10px; color: #6b7280; }
  #tooltip .t-stats { display: flex; gap: 12px; margin-top: 6px; }
  #tooltip .t-stat { font-size: 11px; color: #9ca3af; }
  #tooltip .t-stat strong { color: #a78bfa; }

  /* Stats bar */
  #stats-bar {
    position: absolute; bottom: 12px; right: 12px;
    background: rgba(26,29,46,0.85); border: 1px solid #2d3154;
    border-radius: 8px; padding: 8px 14px; font-size: 11px; color: #6b7280;
    backdrop-filter: blur(6px);
  }
  #stats-bar span { color: #a78bfa; font-weight: 600; }
</style>
</head>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>REDCap KB Graph</h1>
      <p id="subtitle">236 articles · 2,205 dependencies</p>
    </div>

    <div id="controls">
      <div class="control-row">
        <label>Search articles</label>
        <input type="text" id="search" placeholder="ID or title..." />
      </div>
      <div class="control-row">
        <label>Filter by category</label>
        <select id="cat-filter">

        </select>
      </div>
      <div class="control-row">
        <label>Node size by</label>
        <div class="btn-group">
          <button id="btn-in" class="active" onclick="setSizeMode('in')">In-links</button>

          <button id="btn-total" onclick="setSizeMode('total')">Total</button>

      </div>
      <div class="control-row">
        <label>Node Space</label>

          <span>Crowded</span>

        </div>
      </div>
      <div class="control-row">
        <div class="btn-group">
          <button onclick="resetView()">Reset View</button>
          <button onclick="clearSelection()">Clear Select</button>
        </div>
      </div>
    </div>

    <div id="legend">
      <h3>Categories <small style="font-size:10px;color:#4b5563">(click to toggle)</small></h3>
      <div id="legend-items"></div>
    </div>

    <div id="info-panel">
      <div id="info-placeholder">Click a node to see details</div>
      <div id="info-content" style="display:none">
        <div class="info-id" id="info-id"></div>
        <h3 id="info-title"></h3>
        <div class="info-stat">Category: <span id="info-cat"></span></div>
        <div class="info-stat">Referenced by: <span id="info-in"></span> articles</div>
        <div class="info-stat">Links to: <span id="info-out"></span> articles</div>
      </div>
    </div>
  </div>

  <div id="graph-container">
    <svg id="graph"></svg>
    <div id="tooltip"></div>
    <div id="stats-bar">Showing <span id="visible-count">236</span> nodes · <span id="visible-edges">2,205</span> edges</div>
  </div>
</div>

-SURV-09","target":"RC-BL-02"},{"source":"RC-CC-04","target":"RC-INST-01"},{"source":"RC-CC-06","target":"RC-AI-01"},{"source":"RC-PIPE-08","target":"RC-FD-09"},{"source":"RC-IMP-03","target":"RC-API-10"},{"source":"RC-PROJ-03","target":"RC-PIPE-04"},{"source":"RC-PIPE-04","target":"RC-AT-01"},{"source":"RC-SURV-07","target":"RC-FD-05"},{"source":"RC-EXPRT-08","target":"RC-EXPRT-07"},{"source":"RC-NAV-REC-02","target":"RC-DE-10"},{"source":"RC-PIPE-15","target":"RC-PIPE-12"},{"source":"RC-DE-13","target":"RC-API-04"},{"source":"RC-DE-13","target":"RC-API-05"},{"source":"RC-DE-13","target":"RC-DAG-01"},{"source":"RC-DE-13","target":"RC-DE-01"},{"source":"RC-DE-13","target":"RC-DE-02"},{"source":"RC-DE-13","target":"RC-DE-04"},{"source":"RC-DE-13","target":"RC-LOCK-01"},{"source":"RC-DE-13","target":"RC-LOG-01"},{"source":"RC-DE-13","target":"RC-USER-03"},{"source":"RC-DE-01","target":"RC-DE-13"},{"source":"RC-IMP-02","target":"RC-API-01"},{"source":"RC-IMP-02","target":"RC-API-02"},{"source":"RC-IMP-02","target":"RC-API-03"},{"source":"RC-IMP-02","target":"RC-API-36"},{"source":"RC-IMP-02","target":"RC-EXPRT-02"},{"source":"RC-IMP-02","target":"RC-IMP-01"},{"source":"RC-IMP-02","target":"RC-IMP-03"},{"source":"RC-IMP-02","target":"RC-IMP-04"},{"source":"RC-IMP-02","target":"RC-PROJ-05"},{"source":"RC-IMP-01","target":"RC-IMP-02"},{"source":"RC-DSGN-01","target":"RC-FD-08"},{"source":"RC-DSGN-01","target":"RC-FD-06"},{"source":"RC-DSGN-01","target":"RC-LONG-01"},{"source":"RC-DSGN-01","target":"RC-LONG-02"},{"source":"RC-DSGN-01","target":"RC-OPS-01"},{"source":"RC-DSGN-01","target":"RC-SURV-06"},{"source":"RC-DSGN-01","target":"RC-PIPE-05"},{"source":"RC-DSGN-01","target":"RC-BL-01"}]};

// Color palette per category
const CAT_COLORS = {
  "API": "#f59e0b",
  "Control Center": "#3b82f6",
  "Piping & Smart Variables": "#10b981",
  "Action Tags": "#8b5cf6",
  "Data Entry": "#06b6d4",
  "Form Design": "#ec4899",
  "Surveys": "#f97316",
  "Data Export": "#84cc16",
  "MyCap": "#14b8a6",
  "Navigation": "#6366f1",
  "Branching Logic": "#a855f7",
  "Clinical Data": "#ef4444",
  "AI Tools": "#22d3ee",
  "User Rights": "#f43f5e",
  "Project Setup": "#eab308",
  "Randomization": "#d946ef",
  "Alerts": "#fb923c",
  "Calculations": "#4ade80",
  "Data Import": "#60a5fa",
  "Dynamic Data Pull": "#c084fc",
  "Longitudinal": "#34d399",
  "Texting": "#fbbf24",
  "Institution": "#9ca3af",
  "DAGs": "#f87171",
  "Data Quality": "#2dd4bf",
  "Form Display Logic": "#fb7185",
  "Integrations": "#818cf8",
  "Multi-Language": "#86efac",
  "Mobile": "#fcd34d",
  "External Modules": "#e879f9",
  "Design": "#65a30d",
};

function getColor(cat) { return CAT_COLORS[cat] || "#9ca3af"; }

// State
let sizeMode = "in";
let selectedNode = null;
let hiddenCats = new Set();
let searchTerm = "";
let catFilter = "";

// D3 setup
const container = document.getElementById("graph-container");
const svg = d3.select("#graph");
const g = svg.append("g");

const zoom = d3.zoom()
  .scaleExtent([0.05, 4])
  .on("zoom", e => g.attr("transform", e.transform));
svg.call(zoom);

// Arrow markers
const defs = svg.append("defs");
defs.append("marker")
  .attr("id", "arrow")
  .attr("viewBox", "0 -4 8 8")
  .attr("refX", 20).attr("refY", 0)
  .attr("markerWidth", 6).attr("markerHeight", 6)
  .attr("orient", "auto")
  .append("path").attr("d", "M0,-4L8,0L0,4").attr("fill", "#3d4468");

defs.append("marker")
  .attr("id", "arrow-hi")
  .attr("viewBox", "0 -4 8 8")
  .attr("refX", 20).attr("refY", 0)
  .attr("markerWidth", 6).attr("markerHeight", 6)
  .attr("orient", "auto")
  .append("path").attr("d", "M0,-4L8,0L0,4").attr("fill", "#a78bfa");

// Build node map
const nodeMap = {};
GRAPH_DATA.nodes.forEach(n => nodeMap[n.id] = n);

// Build adjacency
const neighbors = {};
GRAPH_DATA.nodes.forEach(n => { neighbors[n.id] = { out: new Set(), in: new Set() }; });
GRAPH_DATA.edges.forEach(e => {
  if (neighbors[e.source]) neighbors[e.source].out.add(e.target);
  if (neighbors[e.target]) neighbors[e.target].in.add(e.source);
});

function nodeRadius(n) {
  const v = sizeMode === "in" ? n.inDegree : sizeMode === "out" ? n.outDegree : (n.inDegree + n.outDegree);
  return Math.max(4, Math.min(22, 4 + v * 0.3));
}

// Simulation
const sim = d3.forceSimulation(GRAPH_DATA.nodes)
  .force("link", d3.forceLink(GRAPH_DATA.edges).id(d => d.id).distance(135).strength(0.15))
  .force("charge", d3.forceManyBody().strength(-300))
  .force("center", d3.forceCenter(0, 0))
  .force("collision", d3.forceCollide().radius(d => nodeRadius(d) + 8))
  .alphaDecay(0.02);

// Draw links
const linkSel = g.append("g").attr("class","links")
  .selectAll("line")
  .data(GRAPH_DATA.edges)
  .join("line")
  .attr("class","link")
  .attr("marker-end","url(#arrow)");

// Draw nodes
const nodeSel = g.append("g").attr("class","nodes")
  .selectAll("g")
  .data(GRAPH_DATA.nodes)
  .join("g")
  .attr("class","node")
  .call(d3.drag()
    .on("start", (e,d) => { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on("drag", (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on("end", (e,d) => { if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }))
  .on("click", onNodeClick)
  .on("mouseover", onMouseOver)
  .on("mouseout", onMouseOut);

nodeSel.append("circle")
  .attr("r", nodeRadius)
  .attr("fill", d => getColor(d.category))
  .attr("fill-opacity", 0.85)
  .attr("stroke", d => d3.color(getColor(d.category)).darker(0.5))
  .attr("stroke-width", 1);

nodeSel.append("text")
  .attr("dy", d => -nodeRadius(d) - 2)
  .attr("text-anchor", "middle")
  .text(d => d.label);

sim.on("tick", () => {
  linkSel
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
});

// Legend
const cats = [...new Set(GRAPH_DATA.nodes.map(n => n.category))].sort();
const catCounts = {};
GRAPH_DATA.nodes.forEach(n => { catCounts[n.category] = (catCounts[n.category]||0)+1; });
const catSel = document.getElementById("cat-filter");
const legendEl = document.getElementById("legend-items");

cats.forEach(cat => {
  // Dropdown option
  const opt = document.createElement("option");
  opt.value = cat; opt.textContent = cat;
  catSel.appendChild(opt);

  // Legend item
  const item = document.createElement("div");
  item.className = "legend-item";
  item.dataset.cat = cat;
  item.innerHTML = `
    <div class="legend-dot" style="background:${getColor(cat)}"></div>
    <span>${cat}</span>
    <span class="legend-count">${catCounts[cat]}</span>`;
  item.addEventListener("click", () => toggleCat(cat));
  legendEl.appendChild(item);
});

// Category filter dropdown
catSel.addEventListener("change", () => {
  catFilter = catSel.value;
  updateVisibility();
});

// Search
document.getElementById("search").addEventListener("input", e => {
  searchTerm = e.target.value.toLowerCase().trim();
  updateVisibility();
});

function toggleCat(cat) {
  if (hiddenCats.has(cat)) hiddenCats.delete(cat);
  else hiddenCats.add(cat);
  document.querySelectorAll(".legend-item").forEach(el => {
    el.classList.toggle("dimmed", hiddenCats.has(el.dataset.cat));
  });
  updateVisibility();
}

function updateVisibility() {
  // Which nodes pass filter
  const visible = new Set();
  GRAPH_DATA.nodes.forEach(n => {
    if (hiddenCats.has(n.category)) return;
    if (catFilter && n.category !== catFilter) return;
    if (searchTerm && !n.id.toLowerCase().includes(searchTerm) && !n.title.toLowerCase().includes(searchTerm)) return;
    visible.add(n.id);
  });

  nodeSel.classed("dimmed", d => !visible.has(d.id));
  linkSel.classed("dimmed", d => !visible.has(d.source.id) || !visible.has(d.target.id));

  const vc = visible.size;
  const ve = GRAPH_DATA.edges.filter(e => visible.has(e.source.id) && visible.has(e.target.id)).length;
  document.getElementById("visible-count").textContent = vc;
  document.getElementById("visible-edges").textContent = ve.toLocaleString();
}

function onNodeClick(e, d) {
  e.stopPropagation();
  if (selectedNode === d.id) { clearSelection(); return; }
  selectedNode = d.id;

  const out = neighbors[d.id].out;
  const inn = neighbors[d.id].in;
  const connected = new Set([d.id, ...out, ...inn]);

  nodeSel.classed("highlighted", n => n.id === d.id);
  nodeSel.classed("dimmed", n => !connected.has(n.id));
  linkSel.classed("highlighted", l => l.source.id === d.id || l.target.id === d.id);
  linkSel.classed("dimmed", l => !connected.has(l.source.id) || !connected.has(l.target.id));
  linkSel.attr("marker-end", l => l.source.id === d.id || l.target.id === d.id ? "url(#arrow-hi)" : "url(#arrow)");

  // Info panel
  document.getElementById("info-placeholder").style.display = "none";
  const ic = document.getElementById("info-content");
  ic.style.display = "block";
  document.getElementById("info-id").textContent = d.id;
  document.getElementById("info-title").textContent = d.title;
  document.getElementById("info-cat").textContent = d.category;
  document.getElementById("info-in").textContent = d.inDegree;
  document.getElementById("info-out").textContent = d.outDegree;
}

svg.on("click", clearSelection);

function clearSelection() {
  selectedNode = null;
  nodeSel.classed("highlighted dimmed", false);
  linkSel.classed("highlighted dimmed", false);
  linkSel.attr("marker-end", "url(#arrow)");
  document.getElementById("info-placeholder").style.display = "block";
  document.getElementById("info-content").style.display = "none";
  updateVisibility();
}

const tooltip = document.getElementById("tooltip");
function onMouseOver(e, d) {
  tooltip.style.display = "block";
  tooltip.innerHTML = `
    <div class="t-id">${d.id}</div>
    <div class="t-title">${d.title}</div>
    <div class="t-cat">${d.category}</div>
    <div class="t-stats">
      <div class="t-stat">In: <strong>${d.inDegree}</strong></div>
      <div class="t-stat">Out: <strong>${d.outDegree}</strong></div>
      <div class="t-stat">Total: <strong>${d.inDegree+d.outDegree}</strong></div>
    </div>`;
  moveTooltip(e);
}
function onMouseOut() { tooltip.style.display = "none"; }
container.addEventListener("mousemove", e => { if(tooltip.style.display==="block") moveTooltip(e); });
function moveTooltip(e) {
  const r = container.getBoundingClientRect();
  let x = e.clientX - r.left + 16, y = e.clientY - r.top + 16;
  if (x + 280 > r.width) x = e.clientX - r.left - 280;
  if (y + 120 > r.height) y = e.clientY - r.top - 120;
  tooltip.style.left = x + "px";
  tooltip.style.top = y + "px";
}

function setSizeMode(m) {
  sizeMode = m;
  document.querySelectorAll(".btn-group button").forEach(b => b.classList.remove("active"));
  document.getElementById("btn-"+m).classList.add("active");
  nodeSel.select("circle").attr("r", nodeRadius);
  nodeSel.select("text").attr("dy", d => -nodeRadius(d) - 2);
  sim.force("collision").radius(d => nodeRadius(d) + 8);
  sim.alpha(0.3).restart();
}

function setNodeSpace(val) {
  const t = (val - 1) / 9;
  const dist   = Math.round(40  + t * 240);
  const charge = Math.round(-50 - t * 400);
  const coll   = Math.round(2   + t * 12);
  sim.force("link").distance(dist).strength(0.15);
  sim.force("charge").strength(charge);
  sim.force("collision").radius(d => nodeRadius(d) + coll);
  sim.alpha(0.4).restart();
}

function resetView() {
  svg.transition().duration(600).call(
    zoom.transform,
    d3.zoomIdentity.translate(container.clientWidth/2, container.clientHeight/2).scale(0.5)
  );
}

// Initial center
setTimeout(() => {
  resetView();
}, 1500);
</script>
</body>
